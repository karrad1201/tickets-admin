name: CI/CD

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest OpenAPI spec from backend
        id: download-spec
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo: karrad1201/ticketsbackend
          workflow: ci-cd.yml
          branch: main
          name: openapi-spec
          path: .

      - name: Check API contract drift
        if: steps.download-spec.outcome == 'success'
        run: |
          npm run generate-api:local
          if ! git diff --exit-code src/lib/api/generated.ts; then
            echo ""
            echo "❌ OpenAPI contract drift detected!"
            echo "   Backend API changed but generated.ts was not updated."
            echo "   Run: npm run generate-api"
            echo "   Then commit src/lib/api/generated.ts"
            exit 1
          fi
          echo "✅ API contract is up to date"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
          AUTH_SECRET: ci-secret-placeholder-32-chars-min

  cd:
    name: Build Docker & Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://api.visit-kalmykia.ru
          tags: |
            ghcr.io/${{ github.repository_owner }}/tickets-admin:latest
            ghcr.io/${{ github.repository_owner }}/tickets-admin:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            cd /opt/tickets
            docker compose pull admin
            docker compose up -d admin
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
